<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .profile-card {
            width: 300px;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            color: white;
        }
        .profile-card img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid white;
        }
        .profile-card h1 {
            margin: 10px 0;
        }
        .profile-card p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSzfU-FC-d5YXuGJ5D8PxaT9ablTneggPJxZQ&s" alt="Profile Image Placeholder">
        <h1>Nilakshana Sandakelum</h1>
        <h1>entreprenure</h1>
        <p><strong>Stream:</strong> information system</p>
        <p>Passionate about leveraging technology to solve real-world problems in the field of Information Systems.</p>
    </div>
</body>
</html>
